<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RouteIQ — Smart Route Planner</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --surface2: #18181f;
      --border: rgba(255,255,255,0.07);
      --border-active: rgba(255,255,255,0.18);
      --accent: #6C63FF;
      --accent2: #A78BFA;
      --accent-glow: rgba(108,99,255,0.25);
      --text: #f0f0f5;
      --muted: rgba(240,240,245,0.45);
      --muted2: rgba(240,240,245,0.2);
      --danger: #f87171;
      --success: #4ade80;
      --font-display: 'Syne', sans-serif;
      --font-body: 'DM Sans', sans-serif;
    }

    html, body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 15px;
      line-height: 1.6;
    }

    body::before {
      content: '';
      position: fixed;
      top: -30vh;
      left: 50%;
      transform: translateX(-50%);
      width: 80vw;
      height: 80vw;
      max-width: 800px;
      max-height: 800px;
      background: radial-gradient(ellipse, rgba(108,99,255,0.12) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    #loginPage, #appPage {
      position: relative;
      z-index: 1;
    }

    .hidden { display: none !important; }

    #loginPage {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .login-card {
      width: 100%;
      max-width: 400px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 3rem 2.5rem;
      position: relative;
      overflow: hidden;
    }

    .login-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(108,99,255,0.8), transparent);
    }

    .login-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 2.5rem;
    }

    .login-logo-icon {
      width: 40px;
      height: 40px;
      background: var(--accent);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-logo-icon svg {
      width: 22px;
      height: 22px;
      stroke: white;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .login-logo-text {
      font-family: var(--font-display);
      font-size: 22px;
      font-weight: 700;
    }

    .login-logo-text span {
      color: var(--accent2);
    }

    .login-tagline {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 2rem;
      font-weight: 300;
    }

    .form-group {
      margin-bottom: 1rem;
    }

    .form-label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }

    input, select {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 16px;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 14px;
      outline: none;
    }

    input:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    input::placeholder {
      color: var(--muted2);
    }

    .btn-primary {
      width: 100%;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 13px 20px;
      font-family: var(--font-display);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 0.5rem;
    }

    .btn-primary:hover {
      opacity: 0.92;
      box-shadow: 0 8px 32px rgba(108,99,255,0.45);
    }

    #appPage {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 2rem;
      border-bottom: 1px solid var(--border);
      background: rgba(10,10,15,0.85);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .topbar-logo {
      font-family: var(--font-display);
      font-size: 18px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .dot {
      width: 8px;
      height: 8px;
      background: var(--accent);
      border-radius: 50%;
      display: inline-block;
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    #welcome {
      font-size: 13px;
      color: var(--muted);
    }

    .nav-tabs {
      display: flex;
      gap: 4px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 4px;
    }

    .nav-tab {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 13px;
      padding: 7px 16px;
      border-radius: 8px;
      cursor: pointer;
    }

    .nav-tab.active {
      background: var(--accent);
      color: white;
    }

    .btn-ghost {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 13px;
      padding: 7px 14px;
      border-radius: 10px;
      cursor: pointer;
    }

    .main-content {
      flex: 1;
      max-width: 740px;
      width: 100%;
      margin: 0 auto;
      padding: 2.5rem 1.5rem;
    }

    .page-header {
      margin-bottom: 2rem;
    }

    .page-title {
      font-family: var(--font-display);
      font-size: 26px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .page-subtitle {
      font-size: 13px;
      color: var(--muted);
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.5rem;
      margin-bottom: 1rem;
    }

    .card-title {
      font-family: var(--font-display);
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 1rem;
    }

    .input-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 10px;
    }

    .btn-add, .btn-action {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 13px;
      font-weight: 500;
      padding: 11px 18px;
      border-radius: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      justify-content: center;
    }

    .btn-add:hover, .btn-action:hover {
      border-color: var(--accent);
      color: var(--accent2);
      background: rgba(108,99,255,0.08);
    }

    .search-wrap {
      position: relative;
      margin-bottom: 1rem;
    }

    .search-wrap input {
      padding-left: 40px;
    }

    .search-wrap svg {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      width: 16px;
      height: 16px;
      stroke: var(--muted2);
      fill: none;
      stroke-width: 2;
    }

    #peopleList {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .person-item, .route-stop {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
    }

    .avatar, .stop-number {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), #a78bfa);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-display);
      font-size: 13px;
      font-weight: 700;
      color: white;
      flex-shrink: 0;
    }

    .person-info, .stop-info {
      flex: 1;
      min-width: 0;
    }

    .person-name, .stop-name {
      font-size: 14px;
      font-weight: 500;
    }

    .person-address, .stop-addr {
      font-size: 12px;
      color: var(--muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .btn-icon {
      background: none;
      border: none;
      color: var(--muted2);
      cursor: pointer;
      padding: 6px;
      border-radius: 8px;
      font-size: 18px;
    }

    .btn-icon:hover {
      color: var(--danger);
      background: rgba(248,113,113,0.1);
    }

    .action-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 1.5rem;
    }

    .btn-action {
      flex: 1;
      min-width: 120px;
      border-radius: 12px;
    }

    .btn-action.accent {
      background: var(--accent);
      border-color: transparent;
      color: white;
    }

    .btn-action.success {
      background: rgba(74,222,128,0.1);
      border-color: rgba(74,222,128,0.3);
      color: var(--success);
    }

    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--muted);
    }

    .empty-state-icon {
      font-size: 40px;
      margin-bottom: 1rem;
      opacity: 0.4;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      background: rgba(108,99,255,0.15);
      color: var(--accent2);
      border: 1px solid rgba(108,99,255,0.3);
      font-size: 11px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 20px;
    }

    #toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--surface);
      border: 1px solid var(--border-active);
      color: var(--text);
      padding: 12px 20px;
      border-radius: 12px;
      font-size: 13px;
      opacity: 0;
      pointer-events: none;
      transition: all 0.3s;
      z-index: 999;
    }

    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 520px) {
      .topbar {
        padding: 0.8rem 1rem;
        gap: 10px;
        flex-wrap: wrap;
      }

      .main-content {
        padding: 1.5rem 1rem;
      }

      .input-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

<div id="loginPage">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-icon">
        <svg viewBox="0 0 24 24">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/>
          <path d="M2 17l10 5 10-5"/>
          <path d="M2 12l10 5 10-5"/>
        </svg>
      </div>
      <span class="login-logo-text">Route<span>IQ</span></span>
    </div>

    <p class="login-tagline">Plan smarter routes. Reach more people. Save more time.</p>

    <div class="form-group">
      <label class="form-label" for="email">Email</label>
      <input id="email" type="email" placeholder="you@example.com">
    </div>

    <div class="form-group">
      <label class="form-label" for="password">Password</label>
      <input id="password" type="password" placeholder="••••••••">
    </div>

    <button class="btn-primary" onclick="login()">Sign in →</button>
  </div>
</div>

<div id="appPage" class="hidden">
  <div class="topbar">
    <div class="topbar-logo">
      <span class="dot"></span> RouteIQ
    </div>

    <div class="nav-tabs">
      <button class="nav-tab active" id="tab-people" onclick="showPage('people')">People</button>
      <button class="nav-tab" id="tab-route" onclick="showPage('route')">Route</button>
    </div>

    <div class="topbar-right">
      <span id="welcome"></span>
      <button class="btn-ghost" onclick="logout()">Sign out</button>
    </div>
  </div>

  <div class="main-content">

    <section id="peoplePage">
      <div class="page-header">
        <h1 class="page-title">People</h1>
        <p class="page-subtitle">Manage your stops and addresses</p>
      </div>

      <div class="card">
        <div class="card-title">Add new person</div>
        <div class="input-row">
          <input id="personName" placeholder="Full name">
          <input id="personAddress" placeholder="Address">
        </div>
        <button class="btn-add" onclick="addPerson()">＋ Add person</button>
      </div>

      <div class="search-wrap">
        <svg viewBox="0 0 24 24">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input id="searchPeople" placeholder="Search people…" oninput="loadPeople()">
      </div>

      <div id="peopleList"></div>
    </section>

    <section id="routePage" class="hidden">
      <div class="page-header">
        <h1 class="page-title">Route</h1>
        <p class="page-subtitle">Build and optimize your route</p>
      </div>

      <div class="card">
        <div class="card-title">Starting point</div>
        <input id="startAddress" placeholder="Enter your starting address">
      </div>

      <div class="card">
  <div class="card-title">End point</div>
  <input id="endAddress" placeholder="Enter your ending address">
     </div>

      <div class="card">
        <div class="card-title">Add a stop</div>
        <select id="personSelect"></select>
        <br><br>
        <button class="btn-add" onclick="addToRoute()">＋ Add to route</button>
      </div>

      <div class="card">
        <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:1rem;">
          <div class="card-title" style="margin-bottom:0;">Stops</div>
          <span class="badge" id="stopCount">0 stops</span>
        </div>

        <div id="routeList">
          <div class="empty-state">
            <div class="empty-state-icon">📍</div>
            <p>No stops yet — add people above</p>
          </div>
        </div>
      </div>

      <div class="action-row">
        <button class="btn-action accent" id="smartBtn" onclick="smartRoute()">⚡ Smart Route</button>
        <button class="btn-action success" onclick="openGoogleMaps()">📍 Open in Maps</button>
        <button class="btn-action" onclick="doneRoute()">✓ Done</button>
      </div>
    </section>

  </div>
</div>

<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>

</body>
</html>
