<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RouteIQ</title>

  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@500;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:#0a0a0f;
      --surface:#111118;
      --surface2:#18181f;
      --border:rgba(255,255,255,.08);
      --accent:#6C63FF;
      --accent2:#A78BFA;
      --text:#f0f0f5;
      --muted:rgba(240,240,245,.5);
      --danger:#f87171;
      --success:#4ade80;
    }

    body {
      min-height:100vh;
      background:var(--bg);
      color:var(--text);
      font-family:"DM Sans", sans-serif;
    }

    body::before {
      content:"";
      position:fixed;
      top:-250px;
      left:50%;
      transform:translateX(-50%);
      width:800px;
      height:800px;
      background:radial-gradient(circle, rgba(108,99,255,.15), transparent 65%);
      pointer-events:none;
    }

    .hidden { display:none !important; }

    #loginPage {
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:30px;
      position:relative;
      z-index:1;
    }

    .login-card {
      width:100%;
      max-width:410px;
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:24px;
      padding:42px 34px;
    }

    .logo {
      display:flex;
      align-items:center;
      gap:12px;
      margin-bottom:24px;
      font-family:"Syne", sans-serif;
      font-weight:800;
      font-size:25px;
    }

    .logo-icon {
      width:42px;
      height:42px;
      background:var(--accent);
      border-radius:13px;
      display:grid;
      place-items:center;
    }

    .logo span span { color:var(--accent2); }

    .tagline {
      color:var(--muted);
      font-size:14px;
      margin-bottom:28px;
    }

    label {
      display:block;
      color:var(--muted);
      font-size:12px;
      text-transform:uppercase;
      letter-spacing:.08em;
      margin-bottom:8px;
    }

    input, select {
      width:100%;
      background:var(--surface2);
      border:1px solid var(--border);
      color:var(--text);
      padding:13px 15px;
      border-radius:12px;
      outline:none;
      font-size:14px;
      margin-bottom:12px;
    }

    input:focus, select:focus {
      border-color:var(--accent);
      box-shadow:0 0 0 3px rgba(108,99,255,.22);
    }

    button {
      cursor:pointer;
      border:none;
      font-family:inherit;
    }

    .btn-primary {
      width:100%;
      background:var(--accent);
      color:white;
      padding:13px;
      border-radius:12px;
      font-weight:700;
      margin-top:8px;
    }

    .btn-primary:hover { opacity:.9; }

    #appPage {
      min-height:100vh;
      position:relative;
      z-index:1;
    }

    .topbar {
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:16px 28px;
      border-bottom:1px solid var(--border);
      background:rgba(10,10,15,.85);
      backdrop-filter:blur(12px);
      position:sticky;
      top:0;
      z-index:10;
    }

    .top-logo {
      font-family:"Syne", sans-serif;
      font-weight:800;
      display:flex;
      align-items:center;
      gap:8px;
    }

    .dot {
      width:8px;
      height:8px;
      background:var(--accent);
      border-radius:50%;
    }

    .nav-tabs {
      display:flex;
      gap:5px;
      background:var(--surface);
      border:1px solid var(--border);
      padding:4px;
      border-radius:12px;
    }

    .nav-tab {
      background:transparent;
      color:var(--muted);
      padding:8px 17px;
      border-radius:9px;
    }

    .nav-tab.active {
      background:var(--accent);
      color:white;
    }

    .top-right {
      display:flex;
      align-items:center;
      gap:14px;
    }

    #welcome {
      color:var(--muted);
      font-size:13px;
    }

    .btn-ghost {
      background:transparent;
      color:var(--muted);
      border:1px solid var(--border);
      padding:8px 14px;
      border-radius:10px;
    }

    .main {
      max-width:760px;
      margin:0 auto;
      padding:38px 18px;
    }

    .page-title {
      font-family:"Syne", sans-serif;
      font-size:30px;
      margin-bottom:4px;
    }

    .page-subtitle {
      color:var(--muted);
      font-size:14px;
      margin-bottom:24px;
    }

    .card {
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:17px;
      padding:22px;
      margin-bottom:15px;
    }

    .card-title {
      font-size:12px;
      color:var(--muted);
      text-transform:uppercase;
      letter-spacing:.08em;
      margin-bottom:13px;
      font-weight:700;
    }

    .input-row {
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }

    .btn-add, .btn-action {
      background:var(--surface2);
      color:var(--text);
      border:1px solid var(--border);
      padding:12px 16px;
      border-radius:11px;
      font-weight:600;
      width:100%;
    }

    .btn-add:hover, .btn-action:hover {
      border-color:var(--accent);
      color:var(--accent2);
    }

    .search-box { margin:18px 0; }

    #peopleList, #routeList {
      display:flex;
      flex-direction:column;
      gap:9px;
    }

    .person-item, .route-stop {
      display:flex;
      align-items:center;
      gap:13px;
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:14px;
      padding:14px;
    }

    .avatar, .stop-number {
      width:38px;
      height:38px;
      border-radius:50%;
      background:linear-gradient(135deg, var(--accent), var(--accent2));
      display:grid;
      place-items:center;
      font-weight:800;
      font-size:13px;
      flex-shrink:0;
    }

    .person-info, .stop-info {
      flex:1;
      min-width:0;
    }

    .person-name, .stop-name {
      font-weight:600;
      font-size:14px;
    }

    .person-address, .stop-addr {
      color:var(--muted);
      font-size:12px;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }

    .btn-icon {
      background:transparent;
      color:var(--muted);
      font-size:18px;
      padding:7px;
      border-radius:8px;
    }

    .btn-icon:hover {
      color:var(--danger);
      background:rgba(248,113,113,.1);
    }

    .badge {
      color:var(--accent2);
      background:rgba(108,99,255,.15);
      border:1px solid rgba(108,99,255,.35);
      padding:4px 9px;
      border-radius:99px;
      font-size:12px;
      font-weight:700;
    }

    .action-row {
      display:grid;
      grid-template-columns:repeat(3, 1fr);
      gap:10px;
      margin-top:18px;
    }

    .accent {
      background:var(--accent);
      color:white;
      border-color:transparent;
    }

    .success {
      background:rgba(74,222,128,.12);
      color:var(--success);
      border-color:rgba(74,222,128,.35);
    }

    .empty-state {
      text-align:center;
      color:var(--muted);
      padding:38px 10px;
    }

    .empty-state-icon {
      font-size:36px;
      opacity:.5;
      margin-bottom:10px;
    }

    #toast {
      position:fixed;
      bottom:25px;
      left:50%;
      transform:translateX(-50%) translateY(20px);
      background:var(--surface);
      border:1px solid rgba(255,255,255,.18);
      padding:12px 18px;
      border-radius:12px;
      opacity:0;
      pointer-events:none;
      transition:.25s;
      z-index:999;
    }

    #toast.show {
      opacity:1;
      transform:translateX(-50%) translateY(0);
    }

    @media(max-width:650px) {
      .topbar { flex-wrap:wrap; gap:12px; }
      .input-row { grid-template-columns:1fr; }
      .action-row { grid-template-columns:1fr; }
    }
  </style>
</head>

<body>

<div id="loginPage">
  <div class="login-card">
    <div class="logo">
      <div class="logo-icon">➤</div>
      <span>Route<span>IQ</span></span>
    </div>

    <p class="tagline">Plan smarter routes. Reach more people. Save more time.</p>

    <label>Email</label>
    <input id="email" type="email" placeholder="you@example.com">

    <label>Password</label>
    <input id="password" type="password" placeholder="••••••••">

    <button class="btn-primary" onclick="login()">Sign in →</button>
  </div>
</div>

<div id="appPage" class="hidden">

  <div class="topbar">
    <div class="top-logo"><span class="dot"></span> RouteIQ</div>

    <div class="nav-tabs">
      <button class="nav-tab active" id="tab-people" onclick="showPage('people')">People</button>
      <button class="nav-tab" id="tab-route" onclick="showPage('route')">Route</button>
    </div>

    <div class="top-right">
      <span id="welcome"></span>
      <button class="btn-ghost" onclick="logout()">Sign out</button>
    </div>
  </div>

  <div class="main">

    <section id="peoplePage">
      <h1 class="page-title">People</h1>
      <p class="page-subtitle">Manage your saved stops and addresses.</p>

      <div class="card">
        <div class="card-title">Add new person</div>
        <div class="input-row">
          <input id="personName" placeholder="Full name">
          <input id="personAddress" placeholder="Address">
        </div>
        <button class="btn-add" onclick="addPerson()">＋ Add person</button>
      </div>

      <div class="search-box">
        <input id="searchPeople" placeholder="Search people..." oninput="loadPeople()">
      </div>

      <div id="peopleList"></div>
    </section>

    <section id="routePage" class="hidden">
      <h1 class="page-title">Route</h1>
      <p class="page-subtitle">Build your route and open it in Google Maps.</p>

      <div class="card">
        <div class="card-title">Starting point</div>
        <input id="startAddress" placeholder="Enter starting address">
      </div>

      <div class="card">
        <div class="card-title">End point</div>
        <input id="endAddress" placeholder="Enter ending address">
      </div>

      <div class="card">
        <div class="card-title">Add a stop</div>
        <select id="personSelect"></select>
        <br><br>
        <button class="btn-add" onclick="addToRoute()">＋ Add to route</button>
      </div>

      <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:14px;">
          <div class="card-title" style="margin:0;">Stops</div>
          <span class="badge" id="stopCount">0 stops</span>
        </div>

        <div id="routeList">
          <div class="empty-state">
            <div class="empty-state-icon">📍</div>
            <p>No stops yet — add people above.</p>
          </div>
        </div>
      </div>

      <div class="action-row">
        <button class="btn-action accent" id="smartBtn" onclick="smartRoute()">⚡ Smart Route</button>
        <button class="btn-action success" onclick="openGoogleMaps()">📍 Open in Maps</button>
        <button class="btn-action" onclick="doneRoute()">✓ Done</button>
      </div>
    </section>

  </div>
</div>

<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>

</body>
</html>
